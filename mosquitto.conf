#Verzeichnis der config-Datei /mosquitto/config/mosquitto.conf

# Standard-Port fuer unverschluesseltes MQTT
listener 1883 0.0.0.0

# Erlaubt Verbindungen ohne Benutzername/Passwort
allow_anonymous true

# Protokollierung zur Fehlerbehebung aktivieren
#log_dest file /var/log/mosquitto/mosquitto.log
#log_type error
#log_type warning
#log_type notice
#log_type information
